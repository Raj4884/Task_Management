# ============================================
# LogSentry - Docker Compose Orchestration
# ============================================
# Usage: docker-compose up -d
# Dashboard: http://localhost:8080
# API Gateway: http://localhost:8000
# ============================================

services:
  # ============================================
  # Infrastructure
  # ============================================
  
  postgres:
    image: postgres:16-alpine
    container_name: logsentry-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-logsentry}
      POSTGRES_USER: ${POSTGRES_USER:-logsentry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logsentry_secret_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-logsentry}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: logsentry-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Application Services
  # ============================================

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: logsentry-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-logsentry}
      - POSTGRES_USER=${POSTGRES_USER:-logsentry}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-logsentry_secret_2024}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - INGESTION_SERVICE_URL=http://log-ingestion:8001
      - QUERY_ENGINE_URL=http://query-engine:8004
      - ANOMALY_SERVICE_URL=http://anomaly-detection:8003
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api-gateway/app:/app/app
      - ./shared:/app/shared
    restart: unless-stopped

  log-ingestion:
    build:
      context: ./services/log-ingestion
      dockerfile: Dockerfile
    container_name: logsentry-ingestion
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_STREAM_NAME=${REDIS_STREAM_NAME:-logs:raw}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/log-ingestion/app:/app/app
      - ./shared:/app/shared
    restart: unless-stopped

  log-processor:
    build:
      context: ./services/log-processor
      dockerfile: Dockerfile
    container_name: logsentry-processor
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-logsentry}
      - POSTGRES_USER=${POSTGRES_USER:-logsentry}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-logsentry_secret_2024}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_STREAM_NAME=${REDIS_STREAM_NAME:-logs:raw}
      - REDIS_CONSUMER_GROUP=${REDIS_CONSUMER_GROUP:-log-processors}
      - REDIS_DEAD_LETTER_STREAM=${REDIS_DEAD_LETTER_STREAM:-logs:dead-letter}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/log-processor/app:/app/app
      - ./shared:/app/shared
    restart: unless-stopped

  query-engine:
    build:
      context: ./services/query-engine
      dockerfile: Dockerfile
    container_name: logsentry-query-engine
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-logsentry}
      - POSTGRES_USER=${POSTGRES_USER:-logsentry}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-logsentry_secret_2024}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/query-engine/app:/app/app
      - ./shared:/app/shared
    restart: unless-stopped

  anomaly-detection:
    build:
      context: ./services/anomaly-detection
      dockerfile: Dockerfile
    container_name: logsentry-anomaly
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-logsentry}
      - POSTGRES_USER=${POSTGRES_USER:-logsentry}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-logsentry_secret_2024}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ANOMALY_CONTAMINATION=${ANOMALY_CONTAMINATION:-0.05}
      - ANOMALY_RETRAIN_INTERVAL_HOURS=${ANOMALY_RETRAIN_INTERVAL_HOURS:-6}
      - ANOMALY_WINDOW_MINUTES=${ANOMALY_WINDOW_MINUTES:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/anomaly-detection/app:/app/app
      - ./shared:/app/shared
      - anomaly_models:/app/models
    restart: unless-stopped

  log-simulator:
    build:
      context: ./services/log-simulator
      dockerfile: Dockerfile
    container_name: logsentry-simulator
    environment:
      - INGESTION_URL=http://api-gateway:8000/api/ingest/batch
      - SIMULATOR_RATE=${SIMULATOR_RATE:-10}
      - SIMULATOR_SERVICES=${SIMULATOR_SERVICES:-auth-service,payment-service,order-service,user-service,notification-service}
      - SIMULATOR_ERROR_SPIKE_INTERVAL=${SIMULATOR_ERROR_SPIKE_INTERVAL:-300}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - api-gateway
    volumes:
      - ./services/log-simulator/app:/app/app
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    container_name: logsentry-dashboard
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  anomaly_models:
